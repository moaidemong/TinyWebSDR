<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>TinySDR - setflux</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: rgba(255, 255, 255, 0.96);
      background: #0000008c;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 8px 10px;
      font: 12px/1.4 "Segoe UI", sans-serif;
      white-space: pre-line;
    }
    .hover-tip {
      position: fixed;
      z-index: 22;
      pointer-events: none;
      color: #f3f8ff;
      background: rgba(8, 14, 28, 0.9);
      border: 1px solid rgba(170, 210, 255, 0.45);
      border-radius: 6px;
      padding: 4px 6px;
      font: 11px/1.2 Consolas, "Courier New", monospace;
      white-space: nowrap;
      transform: translate(10px, -14px);
    }
    .wave-panel {
      position: fixed;
      z-index: 23;
      pointer-events: none;
      width: 320px;
      height: 86px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      padding: 6px 8px;
      box-sizing: border-box;
      color: #0a1120;
    }
    .wave-freq {
      font: 12px/1.2 Consolas, "Courier New", monospace;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .wave-canvas {
      width: 100%;
      height: 58px;
      display: block;
    }
    #attribution {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 18;
      margin: 0;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.62);
      font: 11px/1.45 "Segoe UI", sans-serif;
      text-align: center;
      letter-spacing: 0.01em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="wf" width="1920" height="900"></canvas>
  <div id="meta" class="hud"></div>
  <div id="hoverTip" class="hover-tip" hidden></div>
  <div id="wavePanel" class="wave-panel" hidden>
    <div id="waveFreq" class="wave-freq">-</div>
    <canvas id="waveCanvas" class="wave-canvas" width="304" height="58"></canvas>
  </div>
  <p id="attribution">
    TinySDR real-time RF/IQ waterfall visualizer<br>
    Copyright © 2026 setflux. All rights reserved.
  </p>
  <script>
    const HEADER = 14;
    const canvas = document.getElementById("wf");
    const ctx = canvas.getContext("2d");
    const metaEl = document.getElementById("meta");
    const hoverTipEl = document.getElementById("hoverTip");
    const wavePanelEl = document.getElementById("wavePanel");
    const waveFreqEl = document.getElementById("waveFreq");
    const waveCanvasEl = document.getElementById("waveCanvas");
    const waveCtx = waveCanvasEl.getContext("2d");
    let emaLow = 66;
    let emaHigh = 240;
    let frameBins = 0;
    let displayBins = 0;
    let lastRow = null;
    let hoverState = {
      inside: false,
      strong: false,
      lastMoveTs: 0,
      x: 0,
      y: 0,
      peakBin: -1,
      freqHz: null,
      strength: 0,
    };
    let waveVisible = false;
    let lastHoverSendTs = 0;
    let latestAMWave = null;
    let latestAMWaveTs = 0;
    const NOISE_FLOOR_LIFT = 14;

    let rowImage = ctx.createImageData(1024, 1);
    let currentMeta = {
      center_freq_hz: null,
      sample_rate_hz: null,
    };
    const params = new URLSearchParams(location.search);
    if (params.has("center")) currentMeta.center_freq_hz = Number(params.get("center"));
    if (params.has("span")) currentMeta.sample_rate_hz = Number(params.get("span"));
    const pal = new Uint8Array(256 * 3);
    function lerp(a, b, t) { return a + (b - a) * t; }
    function buildClassicPalette() {
      // Black-base palette: black floor -> blue/cyan -> yellow/orange -> white.
      const stops = [
        [0.00, [0, 0, 0]],
        [0.24, [0, 0, 0]],
        [0.44, [0, 18, 92]],
        [0.68, [0, 120, 255]],
        [0.82, [255, 210, 70]],
        [0.92, [255, 120, 40]],
        [1.00, [255, 255, 255]],
      ];
      for (let i = 0; i < 256; i++) {
        const t = i / 255;
        let a = stops[0];
        let b = stops[stops.length - 1];
        for (let j = 0; j < stops.length - 1; j++) {
          if (t >= stops[j][0] && t <= stops[j + 1][0]) {
            a = stops[j];
            b = stops[j + 1];
            break;
          }
        }
        const localT = (t - a[0]) / (b[0] - a[0] || 1);
        pal[i * 3 + 0] = Math.round(lerp(a[1][0], b[1][0], localT));
        pal[i * 3 + 1] = Math.round(lerp(a[1][1], b[1][1], localT));
        pal[i * 3 + 2] = Math.round(lerp(a[1][2], b[1][2], localT));
      }
    }
    buildClassicPalette();

    function resizeCanvas() {
      canvas.width = Math.max(1024, window.innerWidth);
      canvas.height = Math.max(500, window.innerHeight);
      displayBins = canvas.width;
      rowImage = ctx.createImageData(displayBins, 1);
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function fmtHudHz(v) {
      if (!Number.isFinite(v) || v <= 0) return "-";
      return `${Math.round(v).toLocaleString("en-US")} Hz`;
    }

    function fmtHz(v) {
      if (!Number.isFinite(v) || v <= 0) return "-";
      const khz = Math.floor(v / 1000);
      return `${khz}KHz`;
    }

    function renderMeta() {
      metaEl.textContent =
`Center Freq (Hz): ${fmtHudHz(currentMeta.center_freq_hz)}
Sample Rate (Hz): ${fmtHudHz(currentMeta.sample_rate_hz)}`;
    }
    renderMeta();

    function estimateLevels(row) {
      // Use sampled bins for percentile estimation to keep cost bounded at high FFT sizes.
      const stride = Math.max(1, Math.floor(row.length / 2048));
      const sampled = [];
      for (let i = 0; i < row.length; i += stride) sampled.push(row[i]);
      const sorted = sampled.sort((a, b) => a - b);
      const p30 = sorted[Math.floor(sorted.length * 0.18)];
      const p998 = sorted[Math.floor(sorted.length * 0.998)];
      return [p30, p998];
    }

    function bucketPeak(row, x, outBins) {
      const start = Math.floor(x * row.length / outBins);
      const end = Math.max(start + 1, Math.floor((x + 1) * row.length / outBins));
      let m = 0;
      for (let i = start; i < end; i++) if (row[i] > m) m = row[i];
      return m;
    }

    function drawRow(row) {
      lastRow = row;
      if (frameBins !== row.length) frameBins = row.length;
      const [low, high] = estimateLevels(row);
      emaLow = emaLow * 0.96 + low * 0.04;
      emaHigh = emaHigh * 0.96 + high * 0.04;
      const range = Math.max(34, emaHigh - emaLow);

      ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height - 1, 0, 1, canvas.width, canvas.height - 1);
      const d = rowImage.data;
      for (let x = 0; x < displayBins; x++) {
        const src = bucketPeak(row, x, displayBins);
        const normalized = (src - (emaLow + NOISE_FLOOR_LIFT)) / range;
        const mapped = Math.max(0, Math.min(1, normalized));
        let tone = Math.pow(mapped, 1.65);
        tone += Math.pow(mapped, 7.0) * 0.14;
        if (tone < 0.010) tone = 0;
        const v = Math.round(Math.min(1, tone) * 255);
        const p = x * 4;
        d[p] = pal[v * 3];
        d[p + 1] = pal[v * 3 + 1];
        d[p + 2] = pal[v * 3 + 2];
        d[p + 3] = 255;
      }
      ctx.putImageData(rowImage, 0, 0);
    }

    function showHoverTip(clientX, clientY, text) {
      hoverTipEl.textContent = text;
      hoverTipEl.style.left = `${clientX}px`;
      hoverTipEl.style.top = `${clientY}px`;
      hoverTipEl.hidden = false;
    }

    function hideHoverTip() {
      hoverTipEl.hidden = true;
    }

    function positionWavePanel(clientX, clientY) {
      const pad = 12;
      const w = wavePanelEl.offsetWidth || 320;
      const h = wavePanelEl.offsetHeight || 86;
      let x = clientX + 16;
      let y = clientY + 16;
      if (x + w > window.innerWidth - pad) x = clientX - w - 16;
      if (y + h > window.innerHeight - pad) y = clientY - h - 16;
      if (x < pad) x = pad;
      if (y < pad) y = pad;
      wavePanelEl.style.left = `${x}px`;
      wavePanelEl.style.top = `${y}px`;
    }

    function drawWave(freqHz, strength) {
      const w = waveCanvasEl.width;
      const h = waveCanvasEl.height;
      waveCtx.clearRect(0, 0, w, h);
      waveCtx.fillStyle = "rgba(255,255,255,0.20)";
      waveCtx.fillRect(0, 0, w, h);
      waveCtx.strokeStyle = "rgba(255,255,255,0.95)";
      waveCtx.lineWidth = 1.6;
      const mid = h * 0.5;
      const amp = 8 + Math.min(1, Math.max(0, strength)) * 16;
      waveCtx.beginPath();
      if (latestAMWave && Array.isArray(latestAMWave.samples) && latestAMWave.samples.length > 0) {
        const s = latestAMWave.samples;
        for (let x = 0; x < w; x++) {
          const idx = Math.min(s.length - 1, Math.floor((x / (w - 1)) * s.length));
          const y = mid + (s[idx] * amp);
          if (x === 0) waveCtx.moveTo(x, y);
          else waveCtx.lineTo(x, y);
        }
      } else {
        const cycles = 2.2 + ((Math.floor(freqHz / 1000) % 6) * 0.55);
        const phase = performance.now() * 0.006;
        for (let x = 0; x < w; x++) {
          const t = x / (w - 1);
          const y = mid + Math.sin((Math.PI * 2 * cycles * t) + phase) * amp;
          if (x === 0) waveCtx.moveTo(x, y);
          else waveCtx.lineTo(x, y);
        }
      }
      waveCtx.stroke();
    }

    function showWavePanel(clientX, clientY, freqHz, strength) {
      waveFreqEl.textContent = fmtHz(freqHz);
      positionWavePanel(clientX, clientY);
      drawWave(freqHz, strength);
      wavePanelEl.hidden = false;
      waveVisible = true;
    }

    function hideWavePanel() {
      wavePanelEl.hidden = true;
      waveVisible = false;
    }

    function estimateFreqFromBin(bin) {
      const cf = Number(currentMeta.center_freq_hz);
      const sr = Number(currentMeta.sample_rate_hz);
      if (!Number.isFinite(cf) || !Number.isFinite(sr) || cf <= 0 || sr <= 0 || frameBins <= 0) {
        return null;
      }
      const hzPerBin = sr / frameBins;
      return cf - sr / 2 + bin * hzPerBin;
    }

    function sendHoverControl(force = false) {
      if (
        !hoverState.inside ||
        !hoverState.strong ||
        !Number.isFinite(hoverState.freqHz) ||
        ws.readyState !== WebSocket.OPEN
      ) {
        return;
      }
      const now = performance.now();
      if (!force && now - lastHoverSendTs < 120) return;
      ws.send(JSON.stringify({
        type: "hover",
        mode: "am",
        freq_hz: Math.round(hoverState.freqHz),
        strength: hoverState.strength,
      }));
      lastHoverSendTs = now;
    }

    canvas.addEventListener("mouseleave", () => {
      hoverState.inside = false;
      hideHoverTip();
      hideWavePanel();
    });
    canvas.addEventListener("mousemove", (ev) => {
      if (!lastRow || frameBins <= 0 || displayBins <= 0) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const xCss = ev.clientX - rect.left;
      if (xCss < 0 || xCss >= rect.width) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const xBinApprox = Math.floor((xCss / rect.width) * frameBins);
      const pxToBins = frameBins / Math.max(1, displayBins);
      const halfWindow = Math.max(2, Math.floor(pxToBins * 2.5));
      const lo = Math.max(0, xBinApprox - halfWindow);
      const hi = Math.min(frameBins - 1, xBinApprox + halfWindow);
      let peakBin = lo;
      let peakVal = lastRow[lo];
      for (let i = lo + 1; i <= hi; i++) {
        if (lastRow[i] > peakVal) {
          peakVal = lastRow[i];
          peakBin = i;
        }
      }
      const range = Math.max(34, emaHigh - emaLow);
      const strength = (peakVal - (emaLow + NOISE_FLOOR_LIFT)) / range;
      if (strength < 0.14) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const freq = estimateFreqFromBin(peakBin);
      if (!Number.isFinite(freq)) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      hoverState.inside = true;
      hoverState.strong = true;
      hoverState.lastMoveTs = performance.now();
      hoverState.x = ev.clientX;
      hoverState.y = ev.clientY;
      hoverState.peakBin = peakBin;
      hoverState.freqHz = freq;
      hoverState.strength = strength;
      showHoverTip(ev.clientX, ev.clientY, fmtHz(freq));
      if (waveVisible) {
        positionWavePanel(ev.clientX, ev.clientY);
        drawWave(freq, strength);
      }
      sendHoverControl();
    });

    function hoverTick() {
      if (hoverState.inside && hoverState.strong && lastRow && hoverState.peakBin >= 0 && hoverState.peakBin < lastRow.length) {
        const range = Math.max(34, emaHigh - emaLow);
        const strengthNow = (lastRow[hoverState.peakBin] - (emaLow + NOISE_FLOOR_LIFT)) / range;
        if (strengthNow < 0.12) {
          hoverState.strong = false;
          hideWavePanel();
        } else {
          hoverState.strength = strengthNow;
        }
      }
      if (
        hoverState.inside &&
        hoverState.strong &&
        performance.now() - hoverState.lastMoveTs >= 3000 &&
        Number.isFinite(hoverState.freqHz)
      ) {
        showWavePanel(hoverState.x, hoverState.y, hoverState.freqHz, hoverState.strength);
      }
      requestAnimationFrame(hoverTick);
    }
    requestAnimationFrame(hoverTick);

    function parseFrame(buf) {
      const view = new DataView(buf);
      if (view.byteLength < HEADER) return null;
      const seq = view.getUint32(0, true);
      const tCapture = view.getFloat64(4, true);
      const n = view.getUint16(12, true);
      if (n <= 0) return null;
      if (view.byteLength !== HEADER + n) return null;
      const row = new Uint8Array(buf, HEADER, n);
      return { seq, tCapture, row };
    }

    function buildWebSocketUrl() {
      const override = params.get("ws");
      if (override) return override;

      const scheme = location.protocol === "https:" ? "wss" : "ws";
      const host = location.hostname || "127.0.0.1";

      // Keep direct TinyWebSDR access working when the static client is served
      // from the local Python server on :8080.
      if (location.port === "8080") {
        return `${scheme}://${host}:8765`;
      }

      // When fronted by Caddy, use a same-origin websocket endpoint such as /ws.
      return `${scheme}://${location.host || host}/ws`;
    }

    const ws = new WebSocket(buildWebSocketUrl());
    ws.binaryType = "arraybuffer";
    ws.onopen = () => {};
    ws.onclose = () => {};
    ws.onmessage = (ev) => {
      if (typeof ev.data === "string") {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === "meta") {
            currentMeta = {
              center_freq_hz: Number(msg.center_freq_hz),
              sample_rate_hz: Number(msg.sample_rate_hz),
            };
            renderMeta();
          } else if (msg.type === "am_wave") {
            latestAMWave = msg;
            latestAMWaveTs = performance.now();
            if (waveVisible && Number.isFinite(hoverState.freqHz)) {
              drawWave(hoverState.freqHz, hoverState.strength);
            }
          }
        } catch (_e) {}
        return;
      }
      const frame = parseFrame(ev.data);
      if (!frame) return;
      drawRow(frame.row);
    };

    // Clear stale AM wave if stream pauses.
    setInterval(() => {
      if (latestAMWave && performance.now() - latestAMWaveTs > 1200) {
        latestAMWave = null;
      }
    }, 300);

    // Keep hover control alive even when pointer is stationary.
    setInterval(() => {
      sendHoverControl(true);
    }, 500);
  </script>
</body>
</html>
