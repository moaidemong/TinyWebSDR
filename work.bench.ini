+ 과제 요약:
RTL-SDR v4 기반 단파 워터폴 시각화 시스템을 개발

+ 기본 환경:
Windows 10 + WSL2 (Ubuntu 22.04) + RTL-SDR v4

+ 목표:
브라우저 배경(Three.js)에 SDR++ 스타일의 워터폴을 실시간 렌더링한다.

+ 잠정 아키텍처 원칙:
1. SDR 하드웨어 접근은 반드시 SINGLETON
2.
 2.1. rtl_tcp 프로세스가 하드웨어와 직접 통신 
 2.2. 혹은 librtlsdr을 직접 호출하는 Python 프로세스가 하드웨어와 통신
3. 
 3.1. Python backend는 rtl_tcp TCP 스트림을 읽는다
 3.2. 또는 Python backend가 librtlsdr을 직접 호출하여 IQ 데이터를 읽는다
4. backend는 FFT 결과 row(float32 array)를 생산
5. 
 5.1. 최신 row는 shared memory (prototype bus)에 저장
 5.2. 혹은 Redis pub/sub 채널로 브로드캐스트
6. 
 6.1. WebSocket gateway가 shared memory의 최신 데이터만 브라우저로 전송
 6.2. 혹은 WebSocket gateway가 Redis 채널을 구독하여 브라우저로 전송
7. 
 7.1. 클라이언트는 Three.js로 워터폴 렌더링
 7.2. 클라이언트는 2d canvas로 워터폴 렌더링


+ 잠정 프로세스 구조:
rtl_tcp (hardware singleton)
      │
      │ IQ stream
      ▼
src/core_producer.py
      │
      │ FFT → float32 row
      ▼
shared_memory (latest row)
      │
      ▼
src/ws_server.py
      │
      ▼
browser (Three.js waterfall)

+ rtl_tcp 실행 예:
rtl_tcp -a 127.0.0.1 -p 1234 -f 6800000 -s 2048000
